<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#FF4500">
<meta name="description" content="FireOps · מערכת ניהול תחנת כיבוי אש ומוקד דיווחים">
<title>FireOps · מערכת ניהול תחנת כיבוי אש</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="style-dispatch.css">
</head>
<body>

<!-- ============== TOPBAR ============== -->
<header class="topbar glass">
  <button class="hamburger-btn" id="hamburger-btn" aria-label="תפריט" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <div class="brand">
    <span class="brand-icon">🔥</span>
    <span class="brand-name">FIRE<span class="accent">OPS</span></span>
  </div>
  <div class="topbar-divider"></div>
  <div class="station-selector">
    <label>תחנה</label>
    <select class="station-select" id="station-select"></select>
  </div>
  <div class="shift-indicator" id="shift-indicator">משמרת יום · 07:00–19:00</div>
  <div class="clock" id="clock">00:00:00</div>
  <div class="status-badge online" id="conn-status">ONLINE</div>
  <button class="sound-toggle" id="sound-toggle" title="צליל מכובה · לחץ להפעלה">🔇</button>
  <div class="user-info" id="user-info">
    <div>
      <div id="user-name">משתמש</div>
      <div class="role" id="user-role">--</div>
    </div>
  </div>
</header>

<!-- ============== MAIN LAYOUT ============== -->
<div class="main-layout">

  <!-- Mobile drawer backdrop -->
  <div class="drawer-backdrop" id="drawer-backdrop"></div>

  <!-- Sidebar -->
  <aside class="sidebar glass" id="sidebar">
    <button class="nav-btn active" data-page="dispatch" title="מוקד"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M5 12a7 7 0 0 1 14 0"/><path d="M2 12a10 10 0 0 1 20 0"/></svg></button>
    <button class="nav-btn" data-page="firefighters" title="כבאים"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></button>
    <button class="nav-btn" data-page="apparatus" title="רכבים"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg></button>
    <button class="nav-btn" data-page="equipment" title="ציוד"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></button>
    <button class="nav-btn" data-page="training" title="אימונים"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg></button>
    <button class="nav-btn" data-page="scheduling" title="משמרות"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></button>
    <button class="nav-btn" data-page="op-log" title="יומן מבצעי"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></button>
    <button class="nav-btn" data-page="reports" title="דוחות"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg></button>
    <button class="nav-btn settings-btn" data-page="settings" title="הגדרות"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
  </aside>

  <!-- Page container -->
  <main class="page-container">

    <!-- Dispatch page (fully functional) -->
    <div class="page page-dispatch active" id="page-dispatch">
      <section class="panel glass incidents-panel">
        <h2>אירועים פעילים <span class="badge pulse" id="incidents-badge">0</span></h2>
        <div class="scroll-area" id="incidents-list"></div>
        <button class="cta-dispatch" id="btn-new-incident">⚡ דיווח חדש</button>
        <div class="dispatch-actions">
          <button class="btn-aircraft" id="btn-air-support">✈️ אווירונים</button>
          <button class="btn-aircraft" id="btn-air-heavy">🚁 הזנקה כבדה</button>
        </div>
        <button class="btn-secondary" id="btn-op-log">📋 יומן מבצעי</button>
      </section>

      <section class="map-section">
        <div id="map"></div>
        <div class="map-overlay-top">
          <div class="overlay-stat">
            <span class="label">תגובה ממוצעת</span>
            <span class="value" id="stat-avg-response">04:32</span>
          </div>
          <div class="overlay-stat">
            <span class="label">יחידות בשטח</span>
            <span class="value" id="stat-onscene">0/0</span>
          </div>
          <div class="overlay-stat">
            <span class="label">אירועים פתוחים</span>
            <span class="value" id="stat-open">0</span>
          </div>
        </div>
      </section>

      <section class="panel glass units-panel">
        <h2>יחידות <span class="badge badge-green" id="units-badge">0</span></h2>
        <div class="scroll-area" id="units-list"></div>
      </section>
    </div>

    <!-- Standard module pages (filled by JS on first navigation) -->
    <div class="page page-standard" id="page-firefighters"></div>
    <div class="page page-standard" id="page-apparatus"></div>
    <div class="page page-standard" id="page-equipment"></div>
    <div class="page page-standard" id="page-training"></div>
    <div class="page page-standard" id="page-scheduling"></div>
    <div class="page page-standard" id="page-op-log"></div>
    <div class="page page-standard" id="page-reports"></div>
    <div class="page page-standard" id="page-settings"></div>

  </main>

</div>

<!-- ============== AUTH MODAL ============== -->
<div class="modal-backdrop" id="auth-modal">
  <div class="modal glass">
    <div class="modal-header">
      <div class="brand-icon" style="font-size: 40px;">🔥</div>
      <h2>FIREOPS</h2>
      <p>כניסה למערכת</p>
    </div>
    <div class="modal-body">
      <label class="form-label">שם משתמש</label>
      <input type="text" class="form-input" id="login-name" placeholder="לדוגמה: דוד כהן" autocomplete="name">
      <label class="form-label">תפקיד</label>
      <select class="form-input" id="login-role">
        <option value="dispatcher">מוקדן</option>
        <option value="station_chief">מפקד תחנה</option>
        <option value="shift_officer">קצין משמרת</option>
        <option value="firefighter">כבאי</option>
        <option value="volunteer">מתנדב</option>
        <option value="equipment_manager">מנהל ציוד</option>
        <option value="viewer">צופה</option>
      </select>
      <label class="form-label">תחנה</label>
      <select class="form-input" id="login-station"></select>
      <button class="cta-dispatch" id="btn-login">⚡ כניסה למערכת</button>
    </div>
  </div>
</div>

<!-- ============== GENERIC MODAL ============== -->
<div class="modal-backdrop" id="generic-modal">
  <div class="modal glass" id="generic-modal-content"></div>
</div>

<!-- ============== TOAST CONTAINER ============== -->
<div class="toast-container" id="toasts"></div>

<!-- ============== SCRIPTS ============== -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin></script>
<script src="config.js"></script>
<script src="firebase-config.js"></script>
<script src="sounds.js"></script>
<script src="tactical.js"></script>
<script src="dispatch.js"></script>
<script src="firefighters.js"></script>
<script src="apparatus.js"></script>
<script src="scheduling.js"></script>
<script src="equipment.js"></script>
<script src="training.js"></script>
<script src="op-log.js"></script>
<script src="reports.js"></script>
<script src="settings.js"></script>
<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW registration failed', e));
  }
</script>

</body>
</html>
